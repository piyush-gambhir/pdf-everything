packages:
  - "console"
  - "backend"
  - "types"

# pnpm 11 build-script allowlist. Native modules must be allowed to build or the
# backend crashes at runtime ("Could not locate the bindings file").
allowBuilds:
  '@nestjs/core': true
  better-sqlite3: true
  esbuild: true
  sharp: true
  unrs-resolver: true
  # Denied: analytics/telemetry and browser-mocking postinstalls we don't need.
  '@scarf/scarf': false
  msw: false
